name: Release On Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. 1.3.0 or v1.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Resolve tag input
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}".Trim()
          if (-not $tag) {
            throw "Input 'tag' is required."
          }
          $normalized = $tag -replace '^refs/tags/', ''
          "value=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install

      - name: Set plugin version from tag
        id: version
        shell: pwsh
        run: |
          npm run set:plugin-version-from-tag -- "${{ steps.tag.outputs.value }}"
          $version = node -p "JSON.parse(require('fs').readFileSync('opencode/opencode-yescode-auth/package.json','utf8')).version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build OpenCode plugin bundle
        run: npm run build:opencode-plugin

      - name: Build standalone router exe
        run: npm run build:router:exe

      - name: Package release assets
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Path release -Force | Out-Null

          $pluginZip = "release/opencode-yescode-auth-$version.zip"
          if (Test-Path $pluginZip) { Remove-Item -Force $pluginZip }
          Compress-Archive -Path "dist/opencode/opencode-yescode-auth/*" -DestinationPath $pluginZip -CompressionLevel Optimal

          $exePath = "dist/router/agent-router.exe"
          $exeOut = "release/agent-router-$version.exe"
          Copy-Item -Force $exePath $exeOut

          $checksums = @(
            (Get-FileHash $pluginZip -Algorithm SHA256).Hash.ToLower() + "  " + [System.IO.Path]::GetFileName($pluginZip)
            (Get-FileHash $exeOut -Algorithm SHA256).Hash.ToLower() + "  " + [System.IO.Path]::GetFileName($exeOut)
          )
          $checksums -join "`n" | Out-File -FilePath "release/SHA256SUMS.txt" -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          draft: false
          prerelease: false
          files: |
            release/opencode-yescode-auth-${{ steps.version.outputs.version }}.zip
            release/agent-router-${{ steps.version.outputs.version }}.exe
            release/SHA256SUMS.txt
